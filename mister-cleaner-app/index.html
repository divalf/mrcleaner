<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://mrcleaner.com.br/wp-content/uploads/2020/05/cropped-fav_ico-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mr. Cleaner — O spa do seu sofá</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@300;400;500;700&family=Work+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <body>
    <!-- SVG Noise Filter for Texture -->
    <svg style="display:none;">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      </filter>
    </svg>
    <div class="noise-overlay" style="filter: url(#noiseFilter);"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
